services:
  mongodb:
    image: mongo:8.0
    container_name: loyalty-local-mongo
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin --quiet
      interval: 1s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "40302:27017"
    volumes:
      - loyalty-mongo-local:/data/db
    networks:
      - local-dev-network

networks:
  local-dev-network:
    name: local-dev-network
    external: true

volumes:
  loyalty-mongo-local:
    name: loyalty-mongo-local
